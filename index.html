```html
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>超ダークモード静音カメラ</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* タップ時のハイライトなどを無効化して誤操作を防ぐ */
        * {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            overflow: hidden;
            color: #111111; /* 画面をほぼ真っ黒にするため、文字も極めて暗く配置 */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        /* カメラのプレビューを非表示（または超極小化）にする */
        #previewVideo {
            position: absolute;
            top: 0;
            left: 0;
            width: 1px;
            height: 1px;
            opacity: 0.01;
            pointer-events: none;
        }
    </style>
</head>
<body class="flex flex-col justify-between items-center p-6">

    <!-- カメラプレビュー（画面上はほぼ見えないように隠します） -->
    <video id="previewVideo" autoplay playsinline muted></video>

    <!-- ヘッダー：極限まで視認性を下げたステータス表示 -->
    <div class="w-full flex justify-between items-center opacity-10 text-[10px]">
        <span id="statusText">SYSTEM: READY</span>
        <span id="modeText">MODE: PHOTO</span>
    </div>

    <!-- メイン操作エリア（画面全体のどこをタップしても動作するようにします） -->
    <div id="gestureArea" class="flex-1 w-full flex flex-col justify-center items-center cursor-pointer relative">
        <!-- 画面が真っ黒だと動いているか分からないので、ごく微かにガイドラインを配置 -->
        <div id="guideOverlay" class="text-center transition-opacity duration-300 opacity-20">
            <p class="text-xs text-neutral-400 mb-2">【操作方法】</p>
            <p class="text-[11px] text-neutral-500">画面タップ：写真を撮影</p>
            <p class="text-[11px] text-neutral-500">画面長押し：動画の録画 開始／停止</p>
            <p class="text-[11px] text-neutral-500">2本指タップ：プレビュー表示のON/OFF</p>
        </div>
        
        <!-- 録画中の微かなインジケーター（ほぼ見えない明るさの赤ドット） -->
        <div id="recordingIndicator" class="absolute top-4 right-4 w-2 h-2 rounded-full bg-red-600 hidden opacity-30"></div>
    </div>

    <!-- フッター：超ダークモード用コントロール（極めて薄い表示） -->
    <div class="w-full flex justify-around items-center opacity-10 text-[11px] border-t border-neutral-900 pt-4">
        <button id="togglePreviewBtn" class="px-3 py-1 rounded bg-neutral-900 text-neutral-400">プレビュー切替</button>
        <button id="switchModeBtn" class="px-3 py-1 rounded bg-neutral-900 text-neutral-400">写真 ⇄ 動画</button>
        <button id="openGalleryBtn" class="px-3 py-1 rounded bg-neutral-950 text-neutral-300 font-bold border border-neutral-800">画像一覧 (0)</button>
    </div>

    <!-- 簡易メッセージトースト -->
    <div id="toast" class="fixed bottom-24 left-1/2 transform -translate-x-1/2 bg-neutral-950 text-neutral-500 text-[10px] px-3 py-1 rounded-full opacity-0 transition-opacity duration-300 pointer-events-none"></div>

    <!-- ギャラリーモーダル（撮影した写真を長押し保存するための画面） -->
    <div id="galleryModal" class="fixed inset-0 bg-black z-50 hidden flex flex-col p-4">
        <div class="flex justify-between items-center border-b border-neutral-900 pb-2 mb-4">
            <span class="text-xs text-neutral-500">撮影した画像（長押しで写真に保存できます）</span>
            <button id="closeGalleryBtn" class="text-xs text-neutral-400 bg-neutral-900 px-3 py-1 rounded">閉じる</button>
        </div>
        <!-- 画像一覧グリッド -->
        <div id="galleryGrid" class="flex-1 overflow-y-auto grid grid-cols-3 gap-2">
            <!-- JavaScriptで画像がここに追加されます -->
        </div>
    </div>

    <script>
        const video = document.getElementById('previewVideo');
        const gestureArea = document.getElementById('gestureArea');
        const statusText = document.getElementById('statusText');
        const modeText = document.getElementById('modeText');
        const togglePreviewBtn = document.getElementById('togglePreviewBtn');
        const switchModeBtn = document.getElementById('switchModeBtn');
        const openGalleryBtn = document.getElementById('openGalleryBtn');
        const closeGalleryBtn = document.getElementById('closeGalleryBtn');
        const galleryModal = document.getElementById('galleryModal');
        const galleryGrid = document.getElementById('galleryGrid');
        const guideOverlay = document.getElementById('guideOverlay');
        const recordingIndicator = document.getElementById('recordingIndicator');
        const toast = document.getElementById('toast');

        let mediaStream = null;
        let mediaRecorder = null;
        let recordedChunks = [];
        let isRecording = false;
        let currentMode = 'PHOTO';
        let isPreviewVisible = false;
        let touchTimer = null;
        let isLongTouch = false;
        
        // 撮影した画像を一時的にブラウザメモリに保存する配列
        let capturedPhotos = [];

        function showToast(message) {
            toast.textContent = message;
            toast.classList.remove('opacity-0');
            toast.classList.add('opacity-40');
            setTimeout(() => {
                toast.classList.remove('opacity-40');
                toast.classList.add('opacity-0');
            }, 2000);
        }

        async function initCamera() {
            try {
                const constraints = {
                    video: {
                        facingMode: 'environment',
                        width: { ideal: 1920 },
                        height: { ideal: 1080 }
                    },
                    audio: true
                };

                mediaStream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = mediaStream;
                statusText.textContent = "SYSTEM: ACTIVE";
                showToast("カメラ準備完了");
            } catch (err) {
                console.error(err);
                statusText.textContent = "SYSTEM: ERROR";
                showToast("カメラ権限を許可してください");
            }
        }

        // 写真撮影処理
        function takePhoto() {
            if (!mediaStream) return;

            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth || 1280;
            canvas.height = video.videoHeight || 720;
            
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            try {
                const dataUrl = canvas.toDataURL('image/jpeg');
                
                // 1. 自動ダウンロード（ファイルアプリ用）も並行して実行
                const link = document.createElement('a');
                link.download = `photo_${Date.now()}.jpg`;
                link.href = dataUrl;
                link.click();

                // 2. ギャラリー配列に追加（長押し保存用）
                capturedPhotos.unshift(dataUrl); // 新しいものを先頭に
                updateGalleryButton();
                
                // 画面を一瞬微かにフラッシュ
                document.body.style.backgroundColor = '#111111';
                setTimeout(() => {
                    document.body.style.backgroundColor = '#000000';
                }, 80);

                showToast("撮影完了！画像一覧を確認してください");
            } catch (err) {
                console.error(err);
                showToast("撮影失敗");
            }
        }

        // ギャラリーボタンの数字を更新
        function updateGalleryButton() {
            openGalleryBtn.textContent = `画像一覧 (${capturedPhotos.length})`;
        }

        // ギャラリーを開く
        function openGallery() {
            galleryGrid.innerHTML = '';
            if (capturedPhotos.length === 0) {
                galleryGrid.innerHTML = '<p class="text-neutral-600 text-xs col-span-3 text-center py-8">撮影された写真がありません</p>';
            } else {
                capturedPhotos.forEach((photoData, index) => {
                    const container = document.createElement('div');
                    container.className = 'relative aspect-square bg-neutral-950 rounded overflow-hidden border border-neutral-900';
                    
                    const img = document.createElement('img');
                    img.src = photoData;
                    img.className = 'w-full h-full object-cover active:scale-95 transition-transform duration-200';
                    
                    // iOSで長押し（選択）しやすくするため、CSSで選択禁止を一部解除
                    img.style.webkitUserSelect = 'auto';
                    img.style.userSelect = 'auto';
                    
                    container.appendChild(img);
                    galleryGrid.appendChild(container);
                });
            }
            galleryModal.classList.remove('hidden');
        }

        // ギャラリーを閉じる
        function closeGallery() {
            galleryModal.classList.add('hidden');
        }

        // 動画録画の開始
        function startRecording() {
            if (!mediaStream || isRecording) return;
            recordedChunks = [];
            let options = { mimeType: 'video/webm;codecs=vp9,opus' };
            if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                options = { mimeType: 'video/webm;codecs=vp8,opus' };
                if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                    options = { mimeType: 'video/mp4' };
                }
            }

            try {
                mediaRecorder = new MediaRecorder(mediaStream, options);
            } catch (e) {
                mediaRecorder = new MediaRecorder(mediaStream);
            }

            mediaRecorder.ondataavailable = (event) => {
                if (event.data && event.data.size > 0) recordedChunks.push(event.data);
            };

            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: mediaRecorder.mimeType || 'video/webm' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.download = `video_${Date.now()}.${blob.type.includes('mp4') ? 'mp4' : 'webm'}`;
                link.href = url;
                link.click();
                showToast("ビデオを保存（ファイルアプリへ）");
            };

            mediaRecorder.start();
            isRecording = true;
            recordingIndicator.classList.remove('hidden');
            statusText.textContent = "SYSTEM: RECORDING";
            showToast("動画録画スタート");
        }

        function stopRecording() {
            if (!mediaRecorder || !isRecording) return;
            mediaRecorder.stop();
            isRecording = false;
            recordingIndicator.classList.add('hidden');
            statusText.textContent = "SYSTEM: ACTIVE";
            showToast("録画ストップ");
        }

        function togglePreview() {
            if (isPreviewVisible) {
                video.style.width = '1px';
                video.style.height = '1px';
                video.style.opacity = '0.01';
                video.style.position = 'absolute';
                isPreviewVisible = false;
                showToast("プレビュー非表示");
            } else {
                video.style.width = '100%';
                video.style.height = '100%';
                video.style.opacity = '0.3';
                video.style.position = 'absolute';
                video.style.objectFit = 'cover';
                isPreviewVisible = true;
                showToast("プレビューON");
            }
        }

        function toggleMode() {
            if (currentMode === 'PHOTO') {
                currentMode = 'VIDEO';
                modeText.textContent = "MODE: VIDEO";
                showToast("ビデオモード");
            } else {
                if (isRecording) stopRecording();
                currentMode = 'PHOTO';
                modeText.textContent = "MODE: PHOTO";
                showToast("写真モード");
            }
        }

        // タッチイベント処理
        gestureArea.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                clearTimeout(touchTimer);
                isLongTouch = false;
                togglePreview();
                return;
            }

            isLongTouch = false;
            touchTimer = setTimeout(() => {
                isLongTouch = true;
                if (currentMode === 'VIDEO') {
                    if (!isRecording) startRecording();
                    else stopRecording();
                } else {
                    showToast("動画モードで長押ししてください");
                }
            }, 600);
        });

        gestureArea.addEventListener('touchend', (e) => {
            clearTimeout(touchTimer);
            if (!isLongTouch && e.touches.length === 0) {
                if (currentMode === 'PHOTO') {
                    takePhoto();
                } else {
                    if (isRecording) stopRecording();
                    else showToast("録画は長押ししてください");
                }
            }
        });

        // ボタン操作
        togglePreviewBtn.addEventListener('click', (e) => { e.stopPropagation(); togglePreview(); });
        switchModeBtn.addEventListener('click', (e) => { e.stopPropagation(); toggleMode(); });
        openGalleryBtn.addEventListener('click', (e) => { e.stopPropagation(); openGallery(); });
        closeGalleryBtn.addEventListener('click', (e) => { e.stopPropagation(); closeGallery(); });

        window.onload = () => {
            initCamera();
        };
    </script>
</body>
</html>
